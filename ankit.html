<!DOCTYPE html>
<html>
    <head>
        <title>BGIS REGISTRATION PORTAL</title>
    </head>
    <style>
        body{
            margin:0;
            height:100vh;
            background-image:url(https://www.letsgrowesports.com/_next/image?url=https%3A%2F%2Fik.imagekit.io%2Fpesbot%2Fwebsite%2F359d0-17359506608556-1920.avif%3FupdatedAt%3D1738693882955&w=3840&q=75);
            background-size:100% 100%;
            background-repeat:no-repeat;
            background-position:center;
            color:black;
        }
        .content{
            padding:50px;
        }
    </style>
    <body bgcolor="darkblue">
        <form>
            <table align ="center" border="10" width="700" cellpadding="10" cellspacing="20">
        <tr>
            <td colspan ="2" align="center">
            <h1>BGIS REGISTRATION PORTAL</h1>
            </td>
        </tr>
    </form>
    <form>
        <tr>
            <td>PLAYER ID:</td>
            <td><input type="number" name="player_id" required></td>
        </tr>
        <tr>
            <td>NAME:</td>
            <td><input type="text" name="name" required></td>
        </tr>
        <tr>
            <td>E-MAIL ID:</td>
            <td><input type="email" name="email" required></td>
        </tr>
        <tr>
            <td>CONTACT NUMBER:</td>
            <td><input type="text" size="1" value="+91" />
                -
            <input type ="text" size ="25" required>
            </td>
        </tr>
    <tr>
        <td>GENDER:</td>
        <td>
            <input type="radio" name="gender" value="male" required>MALE
            <input type="radio" name="gender" value="female" required>FEMALE
        </td>
    </tr>
    <tr>
        <td>AGE:</td>
        <td><input type="number" name="age" required></td>
    </tr>
    <tr>
        <td>PLAYER PHOTO:</td>
        <td><input type="file" name="player_photo" required></td>
    </tr>
    <tr>
        <td>UPI ID:</td>
        <td><input type="text" name = "upi_id" required></td>
    </tr>
    <tr>
        <td colspan="2" align="center"><input type="submit" value="SUBMIT"></td>
    </tr>
    </body>
</html>
